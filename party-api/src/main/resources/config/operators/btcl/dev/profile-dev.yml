# ============================================================================
# Party — operator=btcl / profile=dev
# ============================================================================
# Stateless v2: no Party-owned database. Every login flows through a per-tenant
# UserRepoAdapter (odoo / routesphere / ldap / custom) and a configurable
# policy chain (basic-auth + later cedar).
# ============================================================================

quarkus:
  http:
    port: 18081
    root-path: /api/v1
  log:
    level: INFO
    category:
      "com.telcobright.party":
        level: DEBUG
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
  smallrye-health:
    root-path: /q/health
  micrometer:
    export:
      prometheus:
        path: /q/metrics

party:
  # ── v2: stateless adapters + policy chain ────────────────────────────────
  v2:
    default-tenant: t1
    tenants:
      t1:
        user-repo-type: odoo
        odoo:
          base-url:        "${PARTY_V2_T1_ODOO_URL:http://127.0.0.1:7170}"
          db:              "${PARTY_V2_T1_ODOO_DB:platform}"
          admin-user:      "${PARTY_V2_T1_ODOO_ADMIN_USER:}"
          admin-password:  "${PARTY_V2_T1_ODOO_ADMIN_PASSWORD:}"
          timeout-millis:  5000
    policies:
      chain:
        - name: basic-auth
          enabled: true
          order: 10
