# ============================================================================
# Party — operator=btcl / profile=dev
# ============================================================================
# Stateless v2: no Party-owned database. Each tenant binds to a UserRepoProvider
# (odoo / routesphere / ldap / custom) for ancillary endpoints; auth runs through
# a per-endpoint policy chain (Cisco-ACL semantics).
# ============================================================================

quarkus:
  http:
    port: 18081
    root-path: /api/v1
  # device_registry (secure-link registration, frozen §2). Dev-box MySQL;
  # creds overridable via env for anything beyond the local dev cluster.
  datasource:
    jdbc:
      url: "${PARTY_REG_DB_URL:jdbc:mysql://127.0.0.1:3306/party_v2?createDatabaseIfNotExist=true}"
    username: "${PARTY_REG_DB_USER:root}"
    password: "${PARTY_REG_DB_PASSWORD:123456}"
  log:
    level: INFO
    category:
      "com.telcobright.party":
        level: DEBUG
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
  smallrye-health:
    root-path: /q/health
  micrometer:
    export:
      prometheus:
        path: /q/metrics

party:
  # ── v2: stateless adapters + policy chain ────────────────────────────────
  v2:
    default-tenant: t1
    tenants:
      t1:
        user-repo-type: odoo
        odoo:
          base-url:        "${PARTY_V2_T1_ODOO_URL:http://127.0.0.1:7170}"
          # The real instance (orchestrix-v2/odoo-backend-19) serves only this DB (dbfilter).
          db:              "${PARTY_V2_T1_ODOO_DB:odoo_billing_19}"
          # Local-dev default admin/admin (same as portal-api's dev profile);
          # prod supplies real creds via env. Needed for facade provisioning.
          admin-user:      "${PARTY_V2_T1_ODOO_ADMIN_USER:admin}"
          admin-password:  "${PARTY_V2_T1_ODOO_ADMIN_PASSWORD:admin}"
          timeout-millis:  5000
          # Models to introspect for the policy builder vocabulary.
          # Requires admin-user + admin-password to be set; otherwise the names
          # show in the UI with empty field lists.
          entities:
            - res.users
            - res.groups
            - res.partner
    # ── per-endpoint policy chains (Cisco-ACL semantics) ─────────────────
    # Policies evaluate in order. First policy whose execute() returns
    # matched=true wins; its allow/deny verdict is returned and the rest of
    # the chain is skipped. If nothing matches, ApiChain returns an implicit
    # deny (denialCode 9001). Each AuthPolicy is pure Java code combining
    # rules with AND/OR. Generic policies live in com.telcobright.party.v2.policy.common;
    # backend-specific ones (odooLogin, future ldapLogin) live in com.telcobright.party.v2.providers.<backend>.
    api:
      basicAuth:
        policies:
          - odooLogin
          - nocReadOnly
          - timeBased
          - ipBased

    # ── secure-link registration (frozen-interfaces §2, JWT from day one) ──
    registration:
      tenant: t1
      otp:
        # Dev mode (user directive): log the code server-side; the API
        # response NEVER carries it. Flip off when an SMS gateway lands.
        dev-mode: true
        ttl-seconds: 300
        max-attempts: 3
      jwt:
        # HS256 shared-key FILE — byte-identical copy lives on it_vm as
        # ejabberd's jwt_key. Never in git (house rule).
        secret-file: "${PARTY_REG_JWT_SECRET_FILE:/home/mustafa/.secure-link/jwt-dev.key}"
        ttl-seconds: 900
        issuer: party
      xmpp:
        # Must equal ejabberd hosts[0] and Odoo's secure_link.xmpp_vhost.
        domain: "${PARTY_REG_XMPP_DOMAIN:localhost}"
        host: "${PARTY_REG_XMPP_HOST:10.10.185.1}"
        port: 5222
      entitlement:
        # ON: registration requires an ACTIVE IM subscription. base-url is the
        # RTC-Manager entitlement endpoint — served today by portal-api (BSS)
        # over the rtc_mock mirror; a base-url swap moves it to the real
        # RTC-Manager with no code change. portal-api auto-provisions the free
        # default IM sub for a registered partner, so this passes by default.
        enforce: true
        base-url: "${PARTY_REG_ENTITLEMENT_URL:http://127.0.0.1:7120}"
      ejabberd:
        # ON once mod_http_api is enabled on it_vm (central-kill kick).
        kick-enabled: false
        api-url: "${PARTY_REG_EJABBERD_API:}"
      device:
        inactivity-expire-days: 30

    # ── secure-link contacts (frozen-interfaces §6 — party owns the graph) ──
    contacts:
      # Dev owner identity: X-SL-Account header accepted alongside Bearer
      # device-JWTs (flip off when all clients send §2 tokens).
      owner-header-enabled: true
      invites:
        dev-mode: true
