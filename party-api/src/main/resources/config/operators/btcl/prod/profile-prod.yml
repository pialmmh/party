# ============================================================================
# Party — operator=btcl / profile=prod
# ============================================================================
# Stateless v2: no Party-owned database. Each tenant binds to a UserRepoProvider
# (odoo / routesphere / ldap / custom) for ancillary endpoints; auth runs through
# a per-endpoint policy chain (Cisco-ACL semantics).
#
# Secrets (Odoo admin password, etc.) NEVER live in this YAML. They come from
# the remote env file /etc/party/party.env on the production host (written by
# the deploy tool from ~/.secrets/party-btcl.env on the operator's host).
# ============================================================================

quarkus:
  http:
    port: 18081
    root-path: /api/v1
  log:
    level: INFO
    category:
      "com.telcobright.party":
        level: INFO
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
    file:
      enable: true
      path: /var/log/party/party.log
      rotation:
        max-file-size: 100M
        max-backup-index: 10
  smallrye-health:
    root-path: /q/health
  micrometer:
    export:
      prometheus:
        path: /q/metrics

party:
  v2:
    default-tenant: t1
    tenants:
      t1:
        user-repo-type: odoo
        odoo:
          base-url:        "${PARTY_V2_T1_ODOO_URL}"
          db:              "${PARTY_V2_T1_ODOO_DB}"
          admin-user:      "${PARTY_V2_T1_ODOO_ADMIN_USER:}"
          admin-password:  "${PARTY_V2_T1_ODOO_ADMIN_PASSWORD:}"
          timeout-millis:  5000
          entities:
            - res.users
            - res.groups
            - res.partner
    # ── per-endpoint policy chains (Cisco-ACL semantics) ─────────────────
    # First policy whose execute() returns matched=true wins; otherwise the
    # chain returns an implicit deny (denialCode 9001). Generic policies live
    # in com.telcobright.party.v2.policy.common; backend-specific ones
    # (odooLogin, future ldapLogin) live in com.telcobright.party.v2.providers.<backend>.
    api:
      basicAuth:
        policies:
          - odooLogin
          - nocReadOnly
          - timeBased
          - ipBased
