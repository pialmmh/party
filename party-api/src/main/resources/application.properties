# ---- HTTP ----
quarkus.http.port=18081
quarkus.http.root-path=/api/v1

# ---- Application identity ----
quarkus.application.name=party-service
quarkus.application.version=0.1.0-SNAPSHOT

# ---- Logging ----
quarkus.log.level=INFO
quarkus.log.category."com.telcobright.party".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# ---- Health + Metrics ----
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# ---- Datasource ----
# Dev & test: Dev Services auto-provisions MariaDB (no url/user/pass set).
# Prod: explicit env vars.
quarkus.datasource.db-kind=mariadb
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=2

%prod.quarkus.datasource.username=${PARTY_DB_USER:party}
%prod.quarkus.datasource.password=${PARTY_DB_PASS:party}
%prod.quarkus.datasource.jdbc.url=${PARTY_DB_URL:jdbc:mariadb://127.0.0.1:3306/party_master}

# ---- Hibernate ORM ----
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.packages=com.telcobright.party.master.entity

# Dev / test: skip schema validation (Flyway owns the schema, Dev Services DB is always fresh).
%test.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.database.generation=none

# ---- Flyway ----
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration/master
quarkus.flyway.baseline-on-migrate=true

# ---- JWT ----
party.jwt.secret=${PARTY_JWT_SECRET:dev-secret-change-me-dev-secret-change-me-32bytes}
party.jwt.issuer=party-service
party.jwt.access-ttl-minutes=15
party.jwt.refresh-ttl-minutes=1440

# ---- Keycloak integration ----
# Shared secret Keycloak SPI uses to call /internal/kc/*
party.kc-integration.secret=${PARTY_KC_INTEGRATION_SECRET:dev-kc-integration-secret-change-me}
# Admin API access for provisioning realms (disabled by default; flip on for prod)
party.keycloak.admin.enabled=${PARTY_KC_ADMIN_ENABLED:false}
party.keycloak.admin.url=${PARTY_KC_ADMIN_URL:http://localhost:7104}
party.keycloak.admin.realm=${PARTY_KC_ADMIN_REALM:master}
party.keycloak.admin.client-id=${PARTY_KC_ADMIN_CLIENT_ID:admin-cli}
party.keycloak.admin.username=${PARTY_KC_ADMIN_USER:admin}
party.keycloak.admin.password=${PARTY_KC_ADMIN_PASS:admin}

# ---- Temporal (disabled by default; set party.temporal.enabled=true at build time to enable) ----
party.temporal.enabled=false
party.temporal.target=${PARTY_TEMPORAL_TARGET:127.0.0.1:7233}
party.temporal.namespace=${PARTY_TEMPORAL_NAMESPACE:default}
party.task-queue.sync=party-sync-queue
party.task-queue.bulk=party-bulk-queue
party.task-queue.critical=party-critical-queue
