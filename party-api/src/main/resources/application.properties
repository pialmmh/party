# ============================================================================
# Party Service — bootstrap stub
# ============================================================================
# Party runs PER OPERATOR (BTCL, etc.). Each operator owns a Party deployment
# that in turn manages many Tenants (Tenant is a domain entity below operator
# in the graph: operator → tenant → partner → user).
#
# This file is intentionally minimal. Runtime knobs (Galera JDBC URL, Temporal
# target, Keycloak admin creds, JWT secret, HTTP port, log levels, etc.) live
# in per-profile YAML files loaded by PartyProfileConfigSource:
#
#     src/main/resources/config/operators/<operator>/<profile>/profile-<profile>.yml
#
# Select which (operator, profile) this JVM uses by flipping exactly ONE of
# the party.operators[N].enabled flags to true.
# ============================================================================

# ---- Operator selector (exactly one enabled) ----
party.operators[0].name=btcl
party.operators[0].enabled=true
party.operators[0].profile=dev

# ---- Application identity ----
quarkus.application.name=party-service
quarkus.application.version=0.1.0-SNAPSHOT

# ---- Hibernate ORM — package scan is a build-time concern, kept here ----
quarkus.hibernate-orm.packages=com.telcobright.party.master.entity

# ---- Flyway — location is build-time, connection is per-profile ----
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration/master
quarkus.flyway.baseline-on-migrate=true

# ---- Datasource kind (driver selection is build-time in Quarkus) ----
quarkus.datasource.db-kind=mariadb

# ---- CORS — allow party-ui (dev: http://127.0.0.1:7180) to call /api/v1/v2/* ----
# Set here (not in profile YAML) because our custom YAML loader can't express
# the `quarkus.http.cors=true` boolean using SnakeYAML's `~` shorthand.
quarkus.http.cors=true
quarkus.http.cors.origins=http://127.0.0.1:7180,http://localhost:7180
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# ---- Temporal worker gate (BUILD-TIME — @IfBuildProperty on PartyWorkerBootstrap
#      and TemporalSyncDispatcher). Setting this in profile-*.yml has NO effect:
#      Quarkus bakes the bean-registration decision into bytecode at package time.
#      Override with `-Dparty.temporal.enabled=true` on the mvn command
#      (remote-deploy.sh does this automatically for prod-* profiles). ----
party.temporal.enabled=false

# ============================================================================
# Dev / test — Dev Services provisions MariaDB automatically. Do NOT set
# quarkus.datasource.jdbc.url/user/pass in the %test or %dev profile; the
# profile YAML also skips them under these profiles.
# ============================================================================
%test.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.database.generation=none
