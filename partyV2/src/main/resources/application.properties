# partyV2 — BUILD-TIME defaults only. The deployment's runtime specifics and ALL
# secrets live in the single host config file passed via -Dquarkus.config.locations
# (see tools/deploy/remote-deploy-v2.sh + party-v2.host.properties.example). Nothing
# secret or environment-specific belongs in this committed file.

# Package one runnable uber-jar (single-file deploy, arbitrary path on the host).
quarkus.package.jar.type=uber-jar

# Single MySQL JDBC driver on the classpath -> mysql datasource. The JDBC URL +
# credentials (creds come from OpenBao via quarkus-vault) are set at runtime.
quarkus.datasource.db-kind=mysql

# No Testcontainers/dev-services at build or run; this app always uses real config.
quarkus.devservices.enabled=false

# HTTP bind — overridable at runtime by the host config.
quarkus.http.host=0.0.0.0
quarkus.http.port=18081

# Frozen REST contract: all party endpoints live under /api/v1 (build-time fixed).
# e.g. POST /api/v1/contacts/entry, POST /api/v1/v2/auth/validate.
quarkus.http.root-path=/api/v1

# ── Core sync (well-known, frozen §7 — RATIFIED 2026-06-17) ──
# ONE global batch size for BOTH chat + contacts. getSnapshot pages at this size
# (cursor for >batch owners); the sl-sync-proxy bounds a WS replay frame-group to it.
# Key lives OUTSIDE party.v2.* on purpose: same name the C++/TS client reads. Override
# in the host config when the config-manager well-known endpoint lands; default suits
# the average-max user (≤5000 contacts).
core.sync.batchSize=5000

# ── OpenBao (Vault API) NON-SECRET wiring ──
# Must live in this BASE classpath source: quarkus-vault's VaultConfigSourceFactory
# (a RunTimeConfigBuilder) runs during config bootstrap, BEFORE -Dquarkus.config.locations
# is merged. If quarkus.vault.url is only in the external host file, the factory sees no
# url, skips, and leaves VaultConfigHolder null -> NPE in VaultClientProducer. The only
# SECRETS (AppRole role-id + secret-id) stay in the host file (read later, at auth time).
quarkus.vault.url=https://10.10.185.1:8200
quarkus.vault.tls.skip-verify=true
quarkus.vault.kv-secret-engine-version=2
quarkus.vault.kv-secret-engine-mount-path=kv
# HS256 device-JWT key: kv/secure-link/hs256 (field 'key') -> config prop sljwt.key
quarkus.vault.secret-config-kv-path.sljwt=secure-link/hs256
party.v2.registration.jwt.secret=${sljwt.key}
# party DB password: kv/secure-link/party-db (field 'password') via credentials provider
quarkus.vault.credentials-provider.party-db.kv-path=secure-link/party-db
quarkus.datasource.username=partyv2
quarkus.datasource.credentials-provider=party-db

# ── v2 tenant bindings ──────────────────────────────────────────────────────
# Each tenant binds to a user-repo backend. The OdooLoginPolicy authenticates
# with the END USER's own Odoo credentials (self-read on res.users) — no admin
# secret on the login path. base-url/db default to localhost so `mvn quarkus:dev`
# runs out of the box; the it_vm deploy overrides them in the host config file
# (see tools/deploy/remote-deploy-v2.sh).
party.v2.default-tenant=t1
party.v2.tenants.t1.user-repo-type=odoo
party.v2.tenants.t1.odoo.base-url=${PARTY_V2_T1_ODOO_URL:http://127.0.0.1:7170}
party.v2.tenants.t1.odoo.db=${PARTY_V2_T1_ODOO_DB:platform}
party.v2.tenants.t1.odoo.timeout-millis=5000

# ── per-endpoint auth policy chain (Cisco-ACL: first matching policy wins) ────
# odooLogin authenticates against the tenant's Odoo. The three generic policies
# are deliberate no-ops until per-policy params are wired; on the login path they
# fall through (odooLogin matches first on a real attempt). Order = evaluation order.
party.v2.api.basicAuth.policies[0]=odooLogin
party.v2.api.basicAuth.policies[1]=nocReadOnly
party.v2.api.basicAuth.policies[2]=timeBased
party.v2.api.basicAuth.policies[3]=ipBased
