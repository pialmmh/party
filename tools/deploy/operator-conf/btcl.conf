# ============================================================================
# Party — BTCL deploy configuration
# ============================================================================
# Connection details are resolved from the routesphere SSH inventory at:
#   /home/mustafa/telcobright-projects/routesphere/routesphere-core/tools/ssh-automation/servers/btcl/
#
# kafka1, kafka2, kafka3 are the three BTCL VMs hosting Galera + Temporal.
# Party co-locates on all three for active-active HA. Deploy one at a time:
#   ./remote-deploy.sh btcl prod              # kafka1 (default)
#   ./remote-deploy.sh btcl prod-n2           # kafka2
#   ./remote-deploy.sh btcl prod-n3           # kafka3
# All three load the same profile-prod.yml — Party is stateless.
# ============================================================================

[dev]
inventory_operator = btcl
server = kafka1
description = Party dev on BTCL kafka1 (local overlay)

heap_min = 1g
heap_max = 2g
gc_type = G1GC
gc_max_pause_ms = 200
debug_port = 8791
jvm_options = --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED

[prod]
inventory_operator = btcl
server = kafka1
description = Party prod node 1 — kafka1 (overlay 10.10.199.20)
profile_yml = prod

heap_min = 2g
heap_max = 4g
gc_type = G1GC
gc_max_pause_ms = 200
debug_port = 8791
jvm_options = --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED

[prod-n2]
inventory_operator = btcl
server = kafka2
description = Party prod node 2 — kafka2 (overlay 10.10.198.20)
profile_yml = prod

heap_min = 2g
heap_max = 4g
gc_type = G1GC
gc_max_pause_ms = 200
debug_port = 8791
jvm_options = --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED

[prod-n3]
inventory_operator = btcl
server = kafka3
description = Party prod node 3 — kafka3 (overlay 10.10.197.20)
profile_yml = prod

heap_min = 2g
